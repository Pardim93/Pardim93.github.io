<!DOCTYPE html>
<html lang="{% if page.lang %}{{ page.lang }}{% else %}{{ site.default_lang }}{% endif %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="Snake Code (PT)" href="{{ '/feed.xml' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="Snake Code (EN)" href="{{ '/en/feed.xml' | relative_url }}" hreflang="en">
  <script>
    (function() {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">Snake<span>Code</span></a>

      <input type="checkbox" id="nav-toggle" class="nav-toggle" aria-label="Menu">
      <label for="nav-toggle" class="nav-hamburger" aria-hidden="true">
        <span></span><span></span><span></span>
      </label>

      <nav class="site-nav" aria-label="Principal">
        {% if page.lang == 'en' %}
          <a href="{{ '/en/' | relative_url }}"{% if page.url == '/en/' %} class="active"{% endif %}>Home</a>
          <a href="{{ '/en/projects' | relative_url }}"{% if page.url == '/en/projects' %} class="active"{% endif %}>Projects</a>
          <a href="{{ '/' | relative_url }}" class="lang-link" title="Português">PT</a>
        {% else %}
          <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Início</a>
          <a href="{{ '/about' | relative_url }}"{% if page.url == '/about' %} class="active"{% endif %}>Sobre</a>
          <a href="{{ '/projects' | relative_url }}"{% if page.url == '/projects' %} class="active"{% endif %}>Projetos</a>
          <a href="{{ '/en/' | relative_url }}" class="lang-link" title="English">EN</a>
        {% endif %}
        <a href="https://github.com/Pardim93" target="_blank" rel="noopener noreferrer">GitHub</a>
        <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema" title="Alternar tema">
          <span class="icon-sun" aria-hidden="true">&#9788;</span>
          <span class="icon-moon" aria-hidden="true">&#9789;</span>
        </button>
      </nav>
    </div>
  </header>

  <main id="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; {{ site.time | date: '%Y' }} Wellington Pardim &middot; Snake Code</p>
      <nav class="footer-nav" aria-label="Rodapé">
        {% if page.lang == 'en' %}
          <a href="{{ '/en/feed.xml' | relative_url }}">RSS</a>
        {% else %}
          <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
        {% endif %}
        <a href="https://github.com/Pardim93" target="_blank" rel="noopener noreferrer">GitHub</a>
      </nav>
    </div>
  </footer>

  <script>
    (function() {
      var btn = document.getElementById('theme-toggle');
      var current = localStorage.getItem('theme') || 'github';

      btn.addEventListener('click', function() {
        var next = current === 'github' ? 'warm-light' : 'github';
        if (next === 'github') {
          document.documentElement.removeAttribute('data-theme');
        } else {
          document.documentElement.setAttribute('data-theme', next);
        }
        localStorage.setItem('theme', next);
        current = next;
      });
    })();
  </script>
</body>
</html>

title: "Snake Code"
description: "Artigos sobre backend, segurança, programação e experimentos de produtividade."
author: "Wellington Pardim"
email: "wellington@pardim.dev"
url: "https://pardim93.github.io"
baseurl: ""
lang: "pt-BR"
default_lang: pt
languages: [pt, en]
permalink: /:year/:month/:day/:title.html

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

social:
  name: Wellington Pardim
  links:
    - https://github.com/Pardim93

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
      author: Wellington Pardim
  - scope:
      path: "_posts/pt"
      type: "posts"
    values:
      lang: pt
  - scope:
      path: "_posts/en"
      type: "posts"
    values:
      lang: en

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
